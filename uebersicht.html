<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAWO Workflow — TBA-Uebersicht</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;font-size:13px}
#root{max-width:1100px;margin:0 auto;padding:24px 20px 60px}
h1{font-size:20px;font-weight:700;margin-bottom:2px}
.sub{color:#666;font-size:12px;margin-bottom:16px}
/* Toggle */
.toggle{display:flex;gap:0;margin-bottom:20px;border-radius:8px;overflow:hidden;border:1px solid #d1d5db;width:fit-content}
.toggle button{padding:8px 20px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;background:#fff;color:#64748b;transition:all .15s}
.toggle button:hover:not(.on){background:#f1f5f9}
.toggle .on-a{background:#1e40af;color:#fff}
.toggle .on-b{background:#7c3aed;color:#fff}
/* Legend */
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:20px;font-size:11px;align-items:center;color:#555}
.legend b{color:#333}
.lsw{display:inline-block;width:14px;height:14px;border-radius:3px;vertical-align:middle;margin-right:3px;border:1px solid rgba(0,0,0,.12)}
/* Lane */
.lane{display:flex;margin-bottom:3px;transition:opacity .25s}
.lane.dim{opacity:.22;pointer-events:none}
.lane-l{width:150px;flex-shrink:0;padding:12px 10px;font-weight:700;font-size:11px;line-height:1.35;display:flex;flex-direction:column;justify-content:center;border-radius:6px 0 0 6px}
.lane-l small{font-weight:400;color:inherit;opacity:.7;font-size:10px;margin-top:2px}
.lane-r{flex:1;padding:14px 16px;border-radius:0 6px 6px 0;display:flex;flex-wrap:wrap;gap:10px;align-items:center;align-content:center;min-height:70px;position:relative}
/* Lane colors */
.la .lane-l{background:#e8dcc8;color:#5c4a2a} .la .lane-r{background:#f6f0e4}
.lb .lane-l{background:#b8d4f0;color:#1a3a5c} .lb .lane-r{background:#e0edf8}
.lc .lane-l{background:#f5e1a3;color:#6b5900} .lc .lane-r{background:#fdf6d8}
.ld .lane-l{background:#b8d4f0;color:#1a3a5c} .ld .lane-r{background:#e0edf8}
.le .lane-l{background:#c8e6c8;color:#1a4a2c} .le .lane-r{background:#e4f4e4}
.lf .lane-l{background:#ddd;color:#555} .lf .lane-r{background:#ececec}
.lg .lane-l{background:#d4c8f0;color:#3a1a6c} .lg .lane-r{background:#ede8f8}
/* Arrow between lanes */
.arr{display:flex;justify-content:center;padding:0;margin:-1px 0;color:#aaa;font-size:14px;padding-left:150px;transition:opacity .25s}
.arr.dim{opacity:.18}
/* Skill card */
.sk{background:#fff;border:1px solid #ccc;border-radius:7px;padding:9px 12px;min-width:130px;max-width:210px;cursor:pointer;transition:all .15s;position:relative}
.sk:hover{border-color:#888;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.sk.exp{border-color:#2563eb;box-shadow:0 0 0 1px #2563eb}
.sk.sdim{opacity:.25;pointer-events:none}
.sk-icon{font-size:16px;margin-right:5px}
.sk-name{font-weight:600;font-size:12px}
.sk-cmd{font-size:10px;color:#888;font-family:'SF Mono',Consolas,monospace;display:block;margin-top:1px}
.sk-desc{font-size:11px;color:#555;margin-top:4px;line-height:1.35}
.sk-detail{font-size:11px;color:#475569;margin-top:8px;padding-top:7px;border-top:1px solid #eee;line-height:1.4}
.sk-detail b{color:#1e293b}
/* Status badge */
.st{position:absolute;top:6px;right:8px;font-size:9px;padding:1px 6px;border-radius:8px;font-weight:600}
.st-live{background:#dcfce7;color:#166534}
.st-beta{background:#dbeafe;color:#1e40af}
.st-wip{background:#fef3c7;color:#92400e}
/* Spur tag on lane */
.spur-tag{position:absolute;top:5px;right:8px;font-size:9px;font-weight:700;padding:1px 6px;border-radius:4px}
.spur-a{background:#1e40af;color:#fff}
.spur-b{background:#7c3aed;color:#fff}
.spur-ab{background:#475569;color:#fff}
.spur-all{background:#94a3b8;color:#fff}
/* Connector arrow between cards */
.ca{color:#aaa;font-size:16px;flex-shrink:0;display:flex;align-items:center}
/* Repeat badge */
.rep{font-size:9px;background:#ede9fe;color:#5b21b6;padding:1px 5px;border-radius:5px;font-weight:600;margin-left:4px}
/* Note */
.note{margin-top:16px;padding:10px 14px;background:#fff;border:1px solid #ddd;border-radius:8px;font-size:11px;color:#666;line-height:1.5}
.note b{color:#333}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useMemo} = React;

const BLOCKS = [
  {id:"A",name:"Projekt-Erfassung",css:"la",order:1,spuren:["A","B"]},
  {id:"B",name:"Vorab-Kalkulation",css:"lb",order:2,spuren:["A","B"]},
  {id:"C",name:"Beschaffung",css:"lc",order:3,spuren:["A"]},
  {id:"D",name:"Analyse & Abgabe",css:"ld",order:4,spuren:["A","B"]},
  {id:"E",name:"Projekt-Verhandlung",css:"le",order:5,spuren:["A"],sub:"nach Einladung Bietergespraech"},
  {id:"F",name:"Projekt-Abschluss",css:"lf",order:6,spuren:[],sub:"optional"},
  {id:"G",name:"Uebergabe",css:"lg",order:7,spuren:["A","B"],sub:"nach Zuschlag"},
];

const SKILLS = [
  {id:"A-01",block:"A",icon:"\uD83D\uDCC1",name:"Projekt-Erfassung",cmd:"/projekt-erfassung",status:"live",spuren:["A","B"],
   desc:"Projektordner sichten, LV analysieren, Notion-Eintrag anlegen, Spur empfehlen.",
   detail:"Dateien klassifizieren, LV-Schnellanalyse, Steckbrief, Referenz-Matching, Ordnerstruktur, Dokumenten-DB."},
  {id:"A-02",block:"A",icon:"\uD83D\uDCCE",name:"Nachreichung",cmd:"/nachreichung",status:"beta",spuren:[],
   desc:"Neue Dokumente erkennen und in Dokumenten-DB eintragen.",
   detail:"Scan, Diff gegen bestehende DB, Klassifizierung, Quick-Scan, Notion-Update mit GDrive-Links."},
  {id:"B-01",block:"B",icon:"\uD83D\uDCCB",name:"Template-Anwendung",cmd:"/template-anwendung",status:"live",spuren:["A","B"],
   desc:"GAEB-Excel ins GSheet-Template importieren.",
   detail:"Kopiert GSheet-Template, importiert LV-Daten mit Formeln und Formatierung."},
  {id:"B-02",block:"B",icon:"\uD83D\uDD0D",name:"Hinweis-Extraktion",cmd:"/hinweis-extraktion",status:"live",spuren:["A","B"],
   desc:"Demontage, Herstellerbindung, Kabel, Risiken per Regex extrahieren.",
   detail:"Python-Script scannt GSheet. Ergebnis: Spalten in 1.0/1.1/1.2 + hinweise.json."},
  {id:"B-03",block:"B",icon:"\uD83E\uDDEE",name:"Vorab-Kalkulation",cmd:"/vorab-kalkulation",status:"live",spuren:["A","B"],
   desc:"Alle Positionen vorab kalkulieren: Lohn, Material, Sub.",
   detail:"L3-Zuordnung, Kalk-Typ, Referenz-Matching, Vorab-Preise. Subagent-Architektur."},
  {id:"B-01->03",block:"B",icon:"\u26A1",name:"Vorab-Kalk Komplett",cmd:"/vorab-kalkulation-komplett",status:"live",spuren:["A","B"],
   desc:"Block B komplett in einem Durchlauf (B-01 + B-02 + B-03).",
   detail:"Fuehrt Template, Hinweise und Vorab-Kalkulation ohne Unterbrechung durch. Idempotent."},
  {id:"C-01",block:"C",icon:"\uD83D\uDCE8",name:"Material-Anfragen",cmd:"/material-anfragen",status:"live",spuren:["A"],
   desc:"Lieferanten zuordnen und Anfragen per Gmail versenden.",
   detail:"Kanal-Bestimmung, Kontakte laden, Briefings, Gmail-Drafts, Notion-Tracking."},
  {id:"C-02",block:"C",icon:"\uD83D\uDCE5",name:"Inbox-Scan",cmd:"/inbox-scan",status:"beta",spuren:["A"],repeat:true,
   desc:"Gmail nach eingegangenen Angeboten scannen.",
   detail:"Erkennt Lieferant + Projekt, legt Anhaenge in Drive ab, setzt Label, updated Notion."},
  {id:"C-03",block:"C",icon:"\uD83D\uDCCA",name:"Angebots-Auswertung",cmd:"/angebots-auswertung",status:"beta",spuren:["A"],repeat:true,
   desc:"Angebot parsen, mit LV matchen, als Einkaeufer pruefen.",
   detail:"Parse, Matching, QS als Einkaufsexperte, Lieferanten-Tab im GSheet schreiben."},
  {id:"C-05",block:"C",icon:"\uD83D\uDD00",name:"SG-Vergleich",cmd:"/sg-vergleich",status:"beta",spuren:["A"],
   desc:"Sub/Hersteller-Angebote einer SG positionsweise vergleichen.",
   detail:"Scope-Bewertung, Fabrikat-Pruefung, EP-Ausreisser, Nachverhandlungspunkte."},
  {id:"C-06",block:"C",icon:"\u2696\uFE0F",name:"Material-Konsolidierung",cmd:"/material-konsolidierung",status:"beta",spuren:["A"],
   desc:"Alle Angebote zusammenfuehren, besten Preis bestimmen.",
   detail:"GH-Vergleich, SG-Vergleiche, Scope-Pruefung, EK-Entscheidung in 1.2 und 1.0."},
  {id:"D-01",block:"D",icon:"\u2705",name:"Kalkulations-Analyse",cmd:"/kalkulations-analyse",status:"beta",spuren:["A","B"],
   desc:"Fertiges LV analysieren: Fehler, Margen, Risiken.",
   detail:"Script rechnet (Fehler-Scan, Kennzahlen), Claude bewertet als Oberbauleiter."},
  {id:"D-02",block:"D",icon:"\uD83D\uDCE4",name:"Angebotserstellung",cmd:"/angebotserstellung",status:"live",spuren:["A","B"],
   desc:"GAEB X84 + PDF-Angebot erzeugen.",
   detail:"Liest GSheet + Original-X83, generiert Abgabedateien. Pflicht-Pause fuer Bestaetigung."},
  {id:"E-01",block:"E",icon:"\uD83D\uDCC4",name:"Bieterbrief-Verarbeitung",cmd:"/bieterbrief-verarbeitung",status:"wip",spuren:["A"],
   desc:"Bieterbrief vom AG parsen, EK-Untergrenzen berechnen.",
   detail:"Bieterbrief-Excel parsen, gegen Kalkulation matchen, neues GSheet mit Untergrenzen."},
  {id:"E-02",block:"E",icon:"\uD83E\uDD1D",name:"GH-Verhandlung",cmd:"/gh-verhandlung",status:"beta",spuren:["A"],
   desc:"Grosshandels-Preisverhandlung vorbereiten.",
   detail:"Potenzial-Positionen, Bauzeitenplan, Gespraechsleitfaden erstellen."},
  {id:"F-01",block:"F",icon:"\u274C",name:"Lieferanten-Absage",cmd:"/lieferanten-absage",status:"beta",spuren:[],
   desc:"Lieferanten bei Projektverlust per Gmail informieren.",
   detail:"Reply-Drafts an angefragte Lieferanten, Notion-Status aktualisieren."},
  {id:"G-01",block:"G",icon:"\uD83D\uDCDD",name:"Projekt-Zusammenfassung",cmd:"/projekt-zusammenfassung",status:"live",spuren:["A","B"],
   desc:"Zusammenfassung fuer Bauleiter/Projektleiter erstellen.",
   detail:"Alle Dokumente auslesen, Notion-Seite mit Toggle-Headings. Idempotent."},
  {id:"G-02",block:"G",icon:"\uD83D\uDCE6",name:"Uebergabe",cmd:"/uebergabe",status:"live",spuren:["A","B"],
   desc:"Dokumente in den Ops-Ordner kopieren.",
   detail:"Uebergabe-Checkbox aus Dokumenten-DB, Dateien nach N_03_Projekte, sortiert nach Kategorie."},
];

function spurTag(spuren) {
  if (!spuren || spuren.length === 0) return <span className="spur-tag spur-all">alle</span>;
  if (spuren.length === 2) return <span className="spur-tag spur-ab">A + B</span>;
  if (spuren[0] === "A") return <span className="spur-tag spur-a">nur A</span>;
  return <span className="spur-tag spur-b">nur B</span>;
}

function statusCls(s) { return s === "live" ? "st-live" : s === "beta" ? "st-beta" : "st-wip"; }
function statusLabel(s) { return s === "live" ? "live" : s === "beta" ? "beta" : "in Arbeit"; }

function isActive(spuren, spur) { return spuren.length === 0 || spuren.includes(spur); }

function App() {
  const [spur, setSpur] = useState("A");
  const [exp, setExp] = useState(null);

  return (
    <div>
      <h1>TAWO Kalkulations-Workflow</h1>
      <div className="sub">TBA-Uebersicht — Vom Projekteingang bis zur Uebergabe</div>

      <div className="toggle">
        <button className={spur==="A"?"on-a":""} onClick={()=>setSpur("A")}>Spur A — mit Anfragen</button>
        <button className={spur==="B"?"on-b":""} onClick={()=>setSpur("B")}>Spur B — ohne Anfragen</button>
      </div>

      <div className="legend">
        <b>Legende:</b>
        <span><span className="lsw" style={{background:"#fff",borderColor:"#ccc"}}></span> Skill-Karte (klickbar)</span>
        <span><span className="lsw" style={{background:"#dcfce7"}}></span> live</span>
        <span><span className="lsw" style={{background:"#dbeafe"}}></span> beta</span>
        <span><span className="lsw" style={{background:"#fef3c7"}}></span> in Arbeit</span>
        <span><span className="rep">n&times;</span> wiederholbar</span>
      </div>

      {BLOCKS.map((block, bi) => {
        const bActive = isActive(block.spuren, spur);
        const skills = SKILLS.filter(s => s.block === block.id);

        return (
          <React.Fragment key={block.id}>
            {bi > 0 && <div className={"arr" + (!bActive ? " dim" : "")}>{"\u2193"}</div>}
            <div className={"lane " + block.css + (!bActive ? " dim" : "")}>
              <div className="lane-l">
                Block {block.id}<br/>{block.name}
                {block.sub && <small>{block.sub}</small>}
              </div>
              <div className="lane-r">
                {spurTag(block.spuren)}
                {skills.map((sk, si) => {
                  const skActive = isActive(sk.spuren, spur);
                  const isExp = exp === sk.id;
                  return (
                    <React.Fragment key={sk.id}>
                      {si > 0 && <span className="ca">{"\u2192"}</span>}
                      <div
                        className={"sk" + (isExp ? " exp" : "") + (!skActive && bActive ? " sdim" : "")}
                        onClick={() => setExp(isExp ? null : sk.id)}
                      >
                        <span className={"st " + statusCls(sk.status)}>{statusLabel(sk.status)}</span>
                        <div>
                          <span className="sk-icon">{sk.icon}</span>
                          <span className="sk-name">{sk.name}</span>
                          {sk.repeat && <span className="rep">n&times;</span>}
                        </div>
                        <span className="sk-cmd">{sk.cmd}</span>
                        <div className="sk-desc">{sk.desc}</div>
                        {isExp && (
                          <div className="sk-detail">
                            <b>Details:</b> {sk.detail}
                          </div>
                        )}
                      </div>
                    </React.Fragment>
                  );
                })}
              </div>
            </div>
          </React.Fragment>
        );
      })}

      <div className="note">
        <b>Spur A</b> (mit Anfragen) durchlaeuft alle Blocks inkl. Block C (Beschaffung).
        <b> Spur B</b> (ohne Anfragen) ueberspringt Block C und geht direkt von Vorab-Kalkulation zur Analyse.
        <b> Funktionales LV:</b> Muss vor /template-anwendung erst aufbereitet werden (kein eigener Track).
        <b> Block G</b> (Uebergabe) kann ab Block A flexibel ausgefuehrt werden — /projekt-zusammenfassung ist idempotent.
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
