                const col = colors[a] || colors.R;
                return <span key={s.id} className="skill-tag" style={{background:col.bg, color:col.c}}>{a} {s.cmd}</span>;
              })}
            </div>
          </div>
        ))}
      </div>
      {tab && (
        <div className="panel" style={{marginTop:16}}>
          <div className="panel-title">{tab.name} — Spalten-Details</div>
          <div className="overflow-x">
            <table>
              <thead><tr><th style={{width:50}}>Spalte</th><th>Name</th><th>Typ</th><th>Phase</th><th>Quelle</th><th>Beschreibung</th></tr></thead>
              <tbody>
                {tab.columns.map(c => (
                  <tr key={c.col + c.name}>
                    <td><span className="col-letter">{c.col}</span></td>
                    <td style={{fontWeight:600}}>{c.name}</td>
                    <td>{c.type}</td>
                    <td>{c.phase && <span className="pill" style={{background: (phaseColor[c.phase]||{}).bg || '#f1f5f9', color: (phaseColor[c.phase]||{}).text || '#64748b'}}>{c.phase}</span>}</td>
                    <td style={{fontSize:11}}>{c.source}</td>
                    <td style={{fontSize:11, color:'#64748b'}}>{c.desc}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

// ---- TAB 2: Lieferanten-Tabs ----
function TabLieferanten() {
  return (
    <div>
      <div className="tab-desc">
        Pro Lieferant wird ein eigener Tab erstellt. Das Prefix bestimmt die Kategorie und damit die Sortierung im GSheet. Tabs werden von /angebots-auswertung erstellt wenn ein Angebot eingeht.
      </div>
      <div style={{marginBottom:20}}>
        {D.tab_prefixes.map(p => (
          <div key={p.prefix} style={{display:'flex', gap:12, marginBottom:10, padding:'12px 14px', borderRadius:8, border:'1px solid #e2e8f0', background:'#fff'}}>
            <span className="prefix-tag" style={{background: p.bg, color: p.color, alignSelf:'flex-start', marginTop:2}}>{p.prefix}</span>
            <div style={{flex:1}}>
              <div style={{fontWeight:700, fontSize:13, color: p.color}}>{p.kategorie}</div>
              <div style={{fontSize:11, color:'#64748b', marginTop:2}}>{p.desc}</div>
              <div style={{fontSize:11, color:'#475569', marginTop:4}}>Beispiele: <span style={{fontFamily:'monospace'}}>{p.example}</span></div>
            </div>
          </div>
        ))}
      </div>

      <div className="panel">
        <div className="panel-title">Spalten pro Lieferanten-Tab (14 Spalten, 3 Header-Zeilen)</div>
        <div style={{fontSize:11, color:'#64748b', marginBottom:8}}>Zeile 1: Block-Header (Material orange | Sub grün) · Zeile 2: Spalten-Header · Zeile 3: Beschreibungszeile (wird gelöscht) · Daten ab Zeile 4</div>
        <div className="overflow-x">
          <table>
            <thead><tr><th style={{width:50}}>Spalte</th><th>Name</th><th>Typ</th><th>Beschreibung</th></tr></thead>
            <tbody>
              {D.tabs.find(t => t.id === 'lieferant').columns.map(c => (
                <tr key={c.col}>
                  <td><span className="col-letter">{c.col}</span></td>
                  <td style={{fontWeight:600}}>{c.name}</td>
                  <td>{c.type}</td>
                  <td style={{fontSize:11, color:'#64748b'}}>{c.desc}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ---- TAB 3: Skill-Zuordnung ----
function TabSkills() {
  const crudColor = { C: '#166534', R: '#1e40af', U: '#92400e' };
  const crudBg = { C: '#dcfce7', R: '#dbeafe', U: '#fef3c7' };

  return (
    <div>
      <div className="tab-desc">
        Welcher Skill greift auf welchen Tab zu. <span className="pill pill-c">C</span> = erstellt (Create), <span className="pill pill-r">R</span> = liest (Read), <span className="pill pill-u">U</span> = aktualisiert (Update).
      </div>
      <div className="overflow-x">
        <table>
          <thead>
            <tr>
              <th style={{minWidth:200}}>Skill</th>
              {D.tabs.map(t => <th key={t.id} style={{minWidth:60, fontSize:10, textAlign:'center', whiteSpace:'normal', lineHeight:1.3}}>{t.name}</th>)}
              <th>Beschreibung</th>
            </tr>
          </thead>
          <tbody>
            {D.skills.map(s => (
              <tr key={s.id}>
                <td style={{fontWeight:600, fontSize:12}}>{s.cmd}</td>
                {D.tabs.map(t => {
                  const a = s.tabs[t.name];
                  if (!a) return <td key={t.id} style={{textAlign:'center'}}><span style={{color:'#e2e8f0'}}>·</span></td>;
                  return <td key={t.id} style={{textAlign:'center'}}><span className="pill" style={{background: crudBg[a], color: crudColor[a]}}>{a}</span></td>;
                })}
                <td style={{fontSize:11, color:'#475569'}}>{s.desc}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ---- TAB 4: Lebenszyklus ----
function TabLifecycle() {
  return (
    <div>
      <div className="tab-desc">
        Chronologischer Ablauf: Wie das Anfragen-GSheet Schritt für Schritt wächst. Von der leeren Anfragen-Liste über einzelne Lieferanten-Tabs bis zur konsolidierten Entscheidung.
      </div>
      {D.lifecycle.map((p, i) => (
        <div key={i} style={{display:'flex', gap:12, marginBottom:8}}>
          <div style={{minWidth:4, background: p.color, borderRadius:4}}></div>
          <div style={{flex:1, padding:'10px 14px', background: p.color, borderRadius:8, border:'1px solid #e2e8f0'}}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:4}}>
              <strong style={{fontSize:13}}>{p.skill}</strong>
              <div>
                <span style={{fontSize:10, color:'#64748b', marginRight:8}}>{p.block}</span>
                <span className="pill" style={{background:'rgba(255,255,255,0.8)', color:'#1e293b', border:'1px solid #e2e8f0'}}>{p.phase}</span>
              </div>
            </div>
            <div style={{fontSize:12, color:'#475569'}}>{p.what}</div>
          </div>
        </div>
      ))}
      <div className="panel" style={{marginTop:16}}>
        <div className="panel-title">Tab-Wachstum über den Workflow</div>
        <div style={{fontSize:12, color:'#475569', lineHeight:2}}>
          <strong>Start:</strong> 3 Tabs (Anfragen, Positionen, Meta)<br/>
          <strong>Nach Angeboten:</strong> 3 + N Lieferanten-Tabs (02_Obeta, 03_IFE, 04_CWS, ...)<br/>
          <strong>Nach Vergleich:</strong> + M SG-Vergleichs-Tabs (SG_01.01, SG_02.03, ...)<br/>
          <strong>Nach Konsolidierung:</strong> + 3 Master-Tabs (LV-Übersicht, BOM, SG-Übersicht)<br/>
          <strong>Typisch:</strong> 15-25 Tabs am Ende des Beschaffungsprozesses
        </div>
      </div>
    </div>
  );
}

// ---- Main App ----
function App() {
  const [activeTab, setActiveTab] = useState(0);
  const tabs = [
    { label: 'Tab-Übersicht', comp: TabOverview },
    { label: 'Lieferanten-Tabs', comp: TabLieferanten },
    { label: 'Skill-Zuordnung', comp: TabSkills },
    { label: 'Lebenszyklus', comp: TabLifecycle },
  ];
  const Comp = tabs[activeTab].comp;

  return (
    <div>
      <h1>Anfragen & Angebote <span>GSheet Struktur-Referenz</span></h1>
      <div style={{fontSize:12, color:'#64748b', marginBottom:4}}>{D.description}</div>
      <div className="tab-bar">
        {tabs.map((t, i) => (
          <button key={i} className={`tab-btn ${activeTab === i ? 'active' : ''}`} onClick={() => setActiveTab(i)}>{t.label}</button>
        ))}
      </div>
      <Comp />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
