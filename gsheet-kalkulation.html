                  <td style={{fontWeight:600, fontSize:12}}>
                    <div style={{display:'flex', alignItems:'center'}}>
                      {totalChildren > 0 && <span className="expand-btn" onClick={toggleExpand}>{isExpanded ? '\u25BC' : '\u25B6'}</span>}
                      {s.cmd}
                      {totalChildren > 0 && <span style={{fontSize:9, color:'#94a3b8', marginLeft:4}}>({scripts.length}{dataFiles.length > 0 ? `+${dataFiles.length}` : ''})</span>}
                    </div>
                  </td>
                  {D.tabs.map(t => {
                    const access = s.tabs[t.name];
                    if (!access) return <td key={t.id} style={{textAlign:'center'}}><span style={{color:'#e2e8f0'}}>·</span></td>;
                    return <td key={t.id} style={{textAlign:'center'}}><span className="pill" style={{background: crudBg[access], color: crudColor[access]}}>{access}</span></td>;
                  })}
                </tr>,
                isExpanded && scripts.map((sc, idx) => {
                  const isLast = idx === scripts.length - 1 && dataFiles.length === 0;
                  return (
                    <tr key={`${s.id}-script-${idx}`} className="script-row">
                      <td>
                        <div style={{display:'flex', alignItems:'center', flexWrap:'wrap', gap:2}}>
                          <span className="script-name">{isLast ? '\u2514\u2500' : '\u251C\u2500'} {sc.name}</span>
                          <span className={`role-badge role-${sc.role}`}>{sc.role}</span>
                          {sc.imports && sc.imports.length > 0 && <span className="script-meta">imports: {sc.imports.join(', ')}</span>}
                        </div>
                      </td>
                      {D.tabs.map(t => {
                        const access = s.tabs[t.name];
                        if (!access) return <td key={t.id} style={{textAlign:'center', background:'#fafbfc'}}></td>;
                        return <td key={t.id} style={{textAlign:'center', background:'#fafbfc'}}><span className="pill" style={{background: crudBg[access], color: crudColor[access], opacity:0.4, fontSize:9}}>{access}</span></td>;
                      })}
                    </tr>
                  );
                }),
                isExpanded && dataFiles.map((df, idx) => {
                  const isLast = idx === dataFiles.length - 1;
                  const readBy = (df.read_by || []).map(r => r.replace('.py', '')).join(', ');
                  const writtenBy = (df.written_by || 'skill').replace('.py', '');
                  return (
                    <tr key={`${s.id}-data-${idx}`} className="script-row">
                      <td>
                        <div style={{display:'flex', alignItems:'center', flexWrap:'wrap', gap:2}}>
                          <span className="script-name">{isLast ? '\u2514\u2500' : '\u251C\u2500'} \uD83D\uDCC4 {df.name}</span>
                          <span className="role-badge role-data">data</span>
                          <span className="script-meta">write: {writtenBy}{readBy ? ` \u2192 read: ${readBy}` : ''}</span>
                        </div>
                      </td>
                      {D.tabs.map(t => {
                        const access = s.tabs[t.name];
                        if (!access) return <td key={t.id} style={{textAlign:'center', background:'#fafbfc'}}></td>;
                        return <td key={t.id} style={{textAlign:'center', background:'#fafbfc'}}><span className="pill" style={{background: crudBg[access], color: crudColor[access], opacity:0.4, fontSize:9}}>{access}</span></td>;
                      })}
                    </tr>
                  );
                })
              ];
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

        Wie die Tabs untereinander verknüpft sind. Formeln in einem Tab referenzieren Daten aus anderen Tabs. Die wichtigste Kette: 1.1/1.2 → 1.0 → 2.0/3.0 → Deep-Dives.

      <div className="panel" style={{marginBottom:16}}>
        <div className="panel-title">Offset-Warnung</div>
        <div style={{fontSize:12, color:'#991b1b', background:'#fef2f2', padding:'8px 12px', borderRadius:6}}>{D.offset_warning}</div>
      </div>
      <div className="overflow-x">
        <table>
          <thead><tr><th style={{minWidth:160}}>Ziel (liest)</th><th style={{textAlign:'center', width:40}}>←</th><th style={{minWidth:200}}>Quelle (liefert)</th><th>Beschreibung</th></tr></thead>
          <tbody>
            {D.cross_refs.map((ref, i) => (
              <tr key={i}>
                <td><span className="formula-ref">{ref.from}</span></td>
                <td style={{textAlign:'center', color:'#94a3b8', fontSize:16}}>←</td>
                <td><span className="formula-ref">{ref.to}</span></td>
                <td style={{fontSize:11, color:'#475569'}}>{ref.desc}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div className="panel" style={{marginTop:16}}>
        <div className="panel-title">Datenfluss-Kette</div>
        <div style={{fontSize:12, color:'#475569', lineHeight:2}}>
          <span style={{fontWeight:600}}>LV-Import</span> → <span className="formula-ref">1.0 (A-H)</span> →
          <span className="formula-ref">1.1 + 1.2 (Referenz)</span> →
          <span style={{fontWeight:600}}>Vorab-Kalk befüllt 1.1 + 1.2</span> →
          <span className="formula-ref">1.0 (O,V,AD Fallback)</span> →
          <span className="formula-ref">2.0 + 3.0 (SUMPRODUCT/SUMIFS)</span> →
          <span className="formula-ref">2.1 + 3.1 (LARGE/INDEX)</span> →
          <span style={{fontWeight:600}}>Analyse + Export</span>
        </div>
      </div>
    </div>
  );
}

// ---- TAB 4: Lebenszyklus ----
function TabLifecycle() {
  const phases = [
    { skill: "/template-anwendung", block: "B-01", what: "Kopiert Template, importiert LV-Positionen in 1.0 (A-H). Alle Formeln + leere Vorab-Spalten stehen bereit.", tabs: ["1.0_Kalkulation", "Übersicht"], color: "#dcfce7" },
    { skill: "/hinweis-extraktion", block: "B-02", what: "Befüllt Hinweis-Spalten: 1.1!J (Lohn-Hinweis), 1.2!I (HB), 1.2!K (Mat-Hinweis), 1.2!V (Sub-Hinweis). Schreibt Übersicht-Hinweistexte.", tabs: ["1.1_Kalkulation_Lohn", "1.2_Kalkulation_Mat-Sub", "Übersicht"], color: "#dbeafe" },
    { skill: "/vorab-kalkulation", block: "B-03", what: "Hauptbefüllung: L3, Kalk-Typ, Lohn/Mat/Sub Vorab-Werte + Quellen + Konfidenz in 1.1 + 1.2. Aggregation nach 2.0, 3.0, 3.1.", tabs: ["1.0_Kalkulation", "1.1_Kalkulation_Lohn", "1.2_Kalkulation_Mat-Sub", "2.0_SG-Pricing", "3.0_SG-Hinweise", "3.1_Deep-Dive Hinweise"], color: "#fef3c7" },
    { skill: "/angebots-auswertung", block: "C-03", what: "Schreibt Final-EPs in 1.2 (O: Mat EK Final, Z: Sub EK Final) nach jedem ausgewerteten Angebot.", tabs: ["1.2_Kalkulation_Mat-Sub"], color: "#ffedd5" },
    { skill: "/material-konsolidierung", block: "C-06", what: "Bester Preis pro Position → Final-Spalten in 1.0 + 1.2. Formeln in 1.0 ziehen automatisch.", tabs: ["1.0_Kalkulation", "1.2_Kalkulation_Mat-Sub"], color: "#dcfce7" },
    { skill: "/kalkulations-analyse", block: "D-01", what: "Schreibt Quellen-Mix + Lieferanten + Risiken in 2.0/3.0. Liest alle Tabs für Fehlercheck + Kennzahlen.", tabs: ["2.0_SG-Pricing", "3.0_SG-Hinweise"], color: "#ede9fe" },
    { skill: "/angebotserstellung", block: "D-02", what: "Liest finale Werte aus 1.0 + 2.0 für GAEB-Export. Kein Schreibzugriff.", tabs: ["1.0_Kalkulation", "2.0_SG-Pricing"], color: "#f1f5f9" }
  ];

  return (
    <div>
      <div className="tab-desc">
        Chronologischer Ablauf: Wie das GSheet Schritt für Schritt befüllt wird. Jeder Skill fügt eine Schicht hinzu — vom leeren Template bis zur fertigen Kalkulation.
      </div>
      {phases.map((p, i) => (
        <div key={i} style={{display:'flex', gap:12, marginBottom:8}}>
          <div style={{minWidth:4, background: p.color, borderRadius:4}}></div>
          <div style={{flex:1, padding:'10px 14px', background: p.color, borderRadius:8, border:'1px solid #e2e8f0'}}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:4}}>
              <strong style={{fontSize:13}}>{p.skill}</strong>
              <span style={{fontSize:10, color:'#64748b'}}>{p.block}</span>
            </div>
            <div style={{fontSize:12, color:'#475569', marginBottom:6}}>{p.what}</div>
            <div>{p.tabs.map(t => <span key={t} className="skill-tag" style={{background:'rgba(255,255,255,0.7)', color:'#1e293b', border:'1px solid #e2e8f0'}}>{t}</span>)}</div>
          </div>
        </div>
      ))}
    </div>
  );
}

// ---- Main App ----
function App() {
  const [activeTab, setActiveTab] = useState(0);
  const tabs = [
    { label: 'Tab-Übersicht', comp: TabOverview },
    { label: 'Skill-Zuordnung', comp: TabSkills },
    { label: 'Formelnetz', comp: TabFormulas },
    { label: 'Lebenszyklus', comp: TabLifecycle },
  ];
  const Comp = tabs[activeTab].comp;

  return (
    <div>
      <h1>GSheet Kalkulation <span>Struktur-Referenz</span></h1>
      <div style={{fontSize:12, color:'#64748b', marginBottom:4}}>{D.description}</div>
      <div className="tab-bar">
        {tabs.map((t, i) => (
          <button key={i} className={`tab-btn ${activeTab === i ? 'active' : ''}`} onClick={() => setActiveTab(i)}>{t.label}</button>
        ))}
      </div>
      <Comp />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
