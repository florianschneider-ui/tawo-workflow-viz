<script type="text/babel">
const { useState, useMemo } = React;

const D = window.WORKFLOW_DATA;

// Build lookup maps
const skillById = {};
D.skills.forEach(s => { skillById[s.id] = s; });
const blockById = {};
D.blocks.forEach(b => { blockById[b.id] = b; });
const resourceByName = {};
D.resources.forEach(r => { resourceByName[r.name] = r; });

// Resource type groups (ordered)
const TYPE_ORDER = ['Google Sheet','Datei','Datenbank Prozess','Externer Service','Referenz-Daten','Dateisystem'];
const typeColor = {
  'Google Sheet': '#166534',
  'Datei': '#1e40af',
  'Datenbank Prozess': '#6b21a8',
  'Externer Service': '#be185d',
  'Referenz-Daten': '#92400e',
  'Dateisystem': '#0e7490',
};

function groupResourcesByType(resources) {
  const groups = {};
  TYPE_ORDER.forEach(t => { groups[t] = []; });
  resources.forEach(r => {
    if (!groups[r.type]) groups[r.type] = [];
    groups[r.type].push(r);
  });
  return groups;
}

function getAccessType(skill, resourceName) {
  const reads = skill.reads.includes(resourceName);
  const writes = skill.writes.includes(resourceName);
  if (reads && writes) return 'rw';
  if (reads) return 'r';
  if (writes) return 'w';
  return null;
}

function StatusPill({ status }) {
  const cls = status === 'live' ? 'pill-status-live' : status === 'beta' ? 'pill-status-beta' : 'pill-status-inarbeit';
  return <span className={`pill ${cls}`}>{status}</span>;
}

// ---- TAB 1: Ressource-Matrix ----
function Tab1() {
  const resGroups = groupResourcesByType(D.resources);
  const orderedResources = TYPE_ORDER.flatMap(t => resGroups[t] || []);

  return (
    <div>
      <div className="info-row" style={{marginBottom: 12}}>
        <span className="info-item"><strong>{D.skills.length}</strong> Skills</span>
        <span className="info-item"><strong>{D.resources.length}</strong> Ressourcen</span>
        <span className="info-item"><strong>{D.blocks.length}</strong> Blöcke</span>
        <span className="info-item">
          <span className="pill pill-r" style={{marginRight:4}}>R</span>Lesen&nbsp;
          <span className="pill pill-w" style={{marginRight:4}}>W</span>Schreiben&nbsp;
          <span className="pill pill-rw" style={{marginRight:4}}>R/W</span>Beides
        </span>
      </div>
      <div className="overflow-x">
        <table>
          <thead>
            <tr>
              <th className="sticky-col" style={{minWidth:180}}>Skill</th>
              <th style={{minWidth:60, textAlign:'center'}}>Block</th>
              {orderedResources.map(r => (
                <th key={r.name} style={{minWidth:80, maxWidth:110, fontSize:10, fontWeight:600, color: typeColor[r.type] || '#64748b', whiteSpace:'normal', wordBreak:'break-word', lineHeight:'1.3', padding:'6px 6px'}} title={r.name}>
                  {r.name}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {D.blocks.map(block => [
              <tr key={`block-${block.id}`} className="block-header">
                <td className="sticky-col" colSpan={2} style={{fontWeight:700, fontSize:11, color:'#475569', background:'#e2e8f0'}}>{block.name}</td>
                {orderedResources.map(r => (
                  <td key={r.name} style={{background:'#e2e8f0'}}></td>
                ))}
              </tr>,
              ...block.skills.map(sid => {
                const skill = skillById[sid];
                if (!skill) return null;
                return (
                  <tr key={sid} className="skill-row">
                    <td className="sticky-col">
                      <div style={{fontWeight:600, fontSize:12}}>{skill.name}</div>
                      <div className="skill-cmd">{skill.slash_command}</div>
                    </td>
                    <td style={{textAlign:'center'}}><StatusPill status={skill.status}/></td>
                    {orderedResources.map(r => {
                      const t = getAccessType(skill, r.name);
                      if (!t) return <td key={r.name} style={{textAlign:'center'}}><span style={{color:'#e2e8f0', fontSize:12}}>·</span></td>;
                      const cls = t === 'rw' ? 'pill-rw' : t === 'r' ? 'pill-r' : 'pill-w';
                      const label = t === 'rw' ? 'R/W' : t.toUpperCase();
                      return <td key={r.name} style={{textAlign:'center'}}><span className={`pill ${cls}`}>{label}</span></td>;
                    })}
                  </tr>
                );
              }).filter(Boolean)
            ])}
          </tbody>
        </table>
      </div>
      <div style={{marginTop:12, display:'flex', flexWrap:'wrap', gap:12}}>
        {TYPE_ORDER.map(t => resGroups[t]?.length > 0 && (
          <span key={t} style={{fontSize:11, color: typeColor[t], fontWeight:600}}>■ {t} ({resGroups[t].length})</span>
        ))}
      </div>
    </div>
  );
}

// ---- TAB 2: State-Requirements ----
function Tab2() {
  // Collect all "written" resources and which skill first creates them
  const producedBy = {};
  D.skills.forEach(skill => {
    skill.writes.forEach(w => {
      if (!producedBy[w]) producedBy[w] = [];
      producedBy[w].push(skill.id);
    });
  });

  return (
    <div>
      {D.blocks.map(block => (
        <div key={block.id} className="panel">
          <div className="panel-title">{block.name}</div>
          {block.skills.map(sid => {
            const skill = skillById[sid];
            if (!skill) return null;
            const neededReads = skill.reads;
            const produced = skill.writes;
            return (
              <div key={sid} style={{marginBottom:16, paddingBottom:12, borderBottom:'1px solid #e2e8f0'}}>
                <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:6}}>
                  <strong style={{fontSize:13}}>{skill.name}</strong>
                  <span className="skill-cmd" style={{fontSize:11, color:'#64748b'}}>{skill.slash_command}</span>
                  <StatusPill status={skill.status}/>
                </div>
                <div style={{marginBottom:4}}>
                  <span style={{fontSize:11, fontWeight:600, color:'#64748b', marginRight:6}}>Benötigt (reads):</span>
                  {neededReads.map(r => {
                    const isProduced = producedBy[r] && producedBy[r].some(pid => pid !== sid);
                    const isExternal = !producedBy[r] || producedBy[r].length === 0;
                    const cls = isExternal ? 'tag-ext' : 'tag-r';
                    return <span key={r} className={`tag ${cls}`} title={isExternal ? 'Extern / Vorbedingung' : ''}>{r}{isExternal ? ' ⚡' : ''}</span>;
                  })}
                </div>
                <div>
                  <span style={{fontSize:11, fontWeight:600, color:'#64748b', marginRight:6}}>Erzeugt (writes):</span>
                  {produced.map(r => <span key={r} className="tag tag-w">{r}</span>)}
                </div>
              </div>
            );
          })}
        </div>
      ))}
      <div style={{fontSize:11, color:'#64748b', marginTop:4}}>
        <span className="tag tag-ext">⚡</span> = Extern / nicht von einem Workflow-Skill erzeugt (Vorbedingung)
      </div>
    </div>
  );
}

// ---- TAB 3: Reuse-Analyse ----
function Tab3() {
  const [expanded, setExpanded] = useState(null);
  const reuse = D.resources.map(r => ({
    ...r,
    readCount: r.read_by.length,
    writeCount: r.written_by.length,
    total: r.read_by.length + r.written_by.length,
  })).sort((a, b) => b.total - a.total);

  const maxTotal = reuse[0]?.total || 1;

  return (
    <div>
      <div className="overflow-x">
        <table>
          <thead>
            <tr>
              <th>Ressource</th>
              <th>Typ</th>
              <th style={{textAlign:'center'}}>Schreiber</th>
              <th style={{textAlign:'center'}}>Leser</th>
              <th style={{textAlign:'center'}}>Gesamt</th>
              <th>Zugriffe</th>
            </tr>
          </thead>
          <tbody>
            {reuse.map(r => [
              <tr key={r.name} onClick={() => setExpanded(expanded === r.name ? null : r.name)} style={{cursor:'pointer'}}>
                <td style={{fontWeight:600, fontSize:12}}>
                  <span style={{marginRight:6, color:'#94a3b8', fontSize:10}}>{expanded === r.name ? '▼' : '▶'}</span>
                  {r.name}
                </td>
                <td><span style={{fontSize:10, fontWeight:600, color: typeColor[r.type]}}>{r.type}</span></td>
                <td style={{textAlign:'center'}}>
                  {r.writeCount > 0 ? <span className="pill pill-w">{r.writeCount}</span> : <span style={{color:'#e2e8f0'}}>—</span>}
                </td>
                <td style={{textAlign:'center'}}>
                  {r.readCount > 0 ? <span className="pill pill-r">{r.readCount}</span> : <span style={{color:'#e2e8f0'}}>—</span>}
                </td>
                <td style={{textAlign:'center'}}>
                  <span className="pill pill-rw">{r.total}</span>
                </td>
                <td style={{minWidth:120}}>
                  <div style={{display:'flex', alignItems:'center', gap:4}}>
                    <div style={{width: Math.round((r.writeCount / maxTotal) * 80), height:8, borderRadius:4, background:'#dcfce7', display:'inline-block'}}></div>
                    <div style={{width: Math.round((r.readCount / maxTotal) * 80), height:8, borderRadius:4, background:'#dbeafe', display:'inline-block'}}></div>
                  </div>
                </td>
              </tr>,
              expanded === r.name && (
                <tr key={r.name + '-detail'}>
                  <td colSpan={2} style={{background:'#f8fafc'}}></td>
                  <td style={{padding:'8px 10px', background:'#f8fafc', verticalAlign:'top'}}>
                    {r.written_by.length === 0 ? <div style={{fontSize:11, color:'#94a3b8'}}>—</div> :
                      r.written_by.map(sid => {
                        const s = skillById[sid];
                        return <div key={sid} style={{fontSize:11, padding:'1px 0'}}><span style={{color:'#64748b', marginRight:4}}>{sid}</span>{s ? s.name : ''}</div>;
                      })
                    }
                  </td>
                  <td style={{padding:'8px 10px', background:'#f8fafc', verticalAlign:'top'}}>
                    {r.read_by.length === 0 ? <div style={{fontSize:11, color:'#94a3b8'}}>—</div> :
                      r.read_by.map(sid => {
                        const s = skillById[sid];
                        return <div key={sid} style={{fontSize:11, padding:'1px 0'}}><span style={{color:'#64748b', marginRight:4}}>{sid}</span>{s ? s.name : ''}</div>;
                      })
                    }
                  </td>
                  <td colSpan={2} style={{background:'#f8fafc'}}></td>
                </tr>
              )
            ])}
          </tbody>
        </table>
      </div>
      <div style={{marginTop:12, fontSize:11, color:'#64748b', display:'flex', gap:16}}>
        <span><span className="pill pill-w">n</span> Schreibende Skills</span>
        <span><span className="pill pill-r">n</span> Lesende Skills</span>
        <span><span className="pill pill-rw">n</span> Gesamt-Zugriffe</span>
        <span style={{marginLeft:8}}>Klick auf Zeile für Details</span>
      </div>
    </div>
  );
}

// ---- TAB 4: Dependencies ----
function Tab4() {
  // For each skill: what does it need (reads) and which skills write those resources?
  const writtenBy = {};
  D.skills.forEach(skill => {
    skill.writes.forEach(w => {
      if (!writtenBy[w]) writtenBy[w] = [];
      if (!writtenBy[w].includes(skill.id)) writtenBy[w].push(skill.id);
    });
  });

  return (
    <div>
      {D.blocks.map(block => (
        <div key={block.id} className="panel">
          <div className="panel-title">{block.name}</div>
          {block.skills.map(sid => {
            const skill = skillById[sid];
            if (!skill) return null;
            // Build deps: read resource → written by which skills
            const deps = {};
            skill.reads.forEach(res => {
              const producers = (writtenBy[res] || []).filter(p => p !== sid);
              if (producers.length > 0) {
                producers.forEach(p => {
                  if (!deps[p]) deps[p] = [];
                  deps[p].push(res);
                });
              }
            });
            // External resources (not produced by any skill)
            const extResources = skill.reads.filter(res => !writtenBy[res] || writtenBy[res].length === 0);

            return (
              <div key={sid} style={{marginBottom:14, paddingBottom:10, borderBottom:'1px solid #f1f5f9'}}>
                <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:6}}>
                  <strong style={{fontSize:13}}>{skill.name}</strong>
                  <span className="skill-cmd" style={{fontSize:11, color:'#64748b'}}>{skill.slash_command}</span>
                </div>
                {Object.keys(deps).length === 0 && extResources.length === 0 && (
                  <div style={{fontSize:12, color:'#94a3b8'}}>Keine internen Skill-Abhängigkeiten</div>
                )}
                {Object.keys(deps).map(depId => {
                  const depSkill = skillById[depId];
                  return (
                    <div key={depId} className="dep-item">
                      <strong style={{color:'#1e293b'}}>{depSkill ? depSkill.name : depId}</strong>
                      {' '}wegen:{' '}
                      {deps[depId].map(r => <span key={r} className="tag tag-r">{r}</span>)}
                    </div>
                  );
                })}
                {extResources.length > 0 && (
                  <div className="dep-item">
                    <strong style={{color:'#92400e'}}>Externe Vorbedingungen:</strong>{' '}
                    {extResources.map(r => <span key={r} className="tag tag-ext">{r}</span>)}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      ))}
    </div>
  );
}

// ---- TAB 5: Entry-Point Simulator ----
function Tab5() {
  const [selected, setSelected] = useState(null);
  const [spurFilter, setSpurFilter] = useState('all');

  // Build: for each resource, which skills write it?
  const writtenBy = {};
  D.skills.forEach(skill => {
    skill.writes.forEach(w => {
      if (!writtenBy[w]) writtenBy[w] = [];
      if (!writtenBy[w].includes(skill.id)) writtenBy[w].push(skill.id);
    });
  });

  // Get all skills that run BEFORE a given skill in normal flow
  // (simplified: predecessors chain + all skills in earlier blocks)
  function getSkillsBefore(skillId) {
    const skill = skillById[skillId];
    if (!skill) return new Set();
    const blockOrder = D.blocks.map(b => b.id);
    const myBlockIdx = blockOrder.indexOf(skill.block);
    const before = new Set();
    D.skills.forEach(s => {
      const sBlockIdx = blockOrder.indexOf(s.block);
      if (sBlockIdx < myBlockIdx) before.add(s.id);
      // Same block, earlier in block.skills list
      if (sBlockIdx === myBlockIdx) {
        const blockSkills = blockById[skill.block]?.skills || [];
        const myIdx = blockSkills.indexOf(skillId);
        const sIdx = blockSkills.indexOf(s.id);
        if (sIdx < myIdx) before.add(s.id);
      }
    });
    return before;
  }

  const missingAnalysis = useMemo(() => {
    if (!selected) return null;
    const skill = skillById[selected];
    const before = getSkillsBefore(selected);
    const missing = [];
    skill.reads.forEach(res => {
      const producers = writtenBy[res] || [];
      const availableProducers = producers.filter(p => before.has(p));
      const isExternal = producers.length === 0;
      if (!isExternal && availableProducers.length === 0) {
        missing.push({ resource: res, wouldBeProducedBy: producers });
      }
    });
    return missing;
  }, [selected]);

  const filteredSkills = D.skills.filter(s => {
    if (spurFilter === 'all') return true;
    return s.spuren.includes(spurFilter);
  });

  return (
    <div>
      <div style={{marginBottom:16}}>
        <div style={{fontSize:13, fontWeight:600, marginBottom:8}}>Spur-Filter</div>
        <div className="spur-filter">
          {['all','A','B','C'].map(spur => (
            <button key={spur} className={`spur-btn ${spurFilter === spur ? 'active' : ''}`} onClick={() => setSpurFilter(spur)}>
              {spur === 'all' ? 'Alle Spuren' : `Spur ${spur}`}
            </button>
          ))}
        </div>
      </div>
      <div style={{fontSize:13, fontWeight:600, marginBottom:8}}>Skill als Einstiegspunkt wählen:</div>
      <div className="entry-grid">
        {filteredSkills.map(skill => (
          <button key={skill.id} className={`entry-btn ${selected === skill.id ? 'selected' : ''}`} onClick={() => setSelected(skill.id === selected ? null : skill.id)}>
            <div className="entry-btn-id">{skill.id} · <StatusPill status={skill.status}/></div>
            <div style={{fontWeight:600, fontSize:12}}>{skill.name}</div>
            <div style={{fontSize:10, color:'#64748b', marginTop:2}}>{skill.slash_command}</div>
          </button>
        ))}
      </div>
      {selected && (
        <div className="panel" style={{marginTop:8}}>
          <div className="panel-title">
            Analyse: Einstieg bei <strong>{skillById[selected]?.name}</strong> ({selected})
          </div>
          <div style={{fontSize:12, color:'#64748b', marginBottom:12}}>
            Wenn alle vorherigen Skills übersprungen werden — welcher State fehlt?
          </div>
          {missingAnalysis?.length === 0 ? (
            <div className="missing-ok">Kein fehlender State — alle Reads sind extern oder werden durch frühere Steps bereitgestellt.</div>
          ) : (
            <div className="missing-list">
              {missingAnalysis?.map(m => (
                <div key={m.resource} className="missing-item">
                  <span className="pill pill-miss">FEHLT</span>
                  <div>
                    <strong style={{fontSize:12}}>{m.resource}</strong>
                    <div style={{fontSize:11, color:'#64748b', marginTop:2}}>
                      Würde erzeugt von: {m.wouldBeProducedBy.map(p => {
                        const sk = skillById[p];
                        return <span key={p} className="tag tag-r" style={{marginLeft:2}}>{sk ? sk.name : p}</span>;
                      })}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}
          <div style={{marginTop:12, fontSize:11, color:'#94a3b8'}}>
            Normale Vorgänger laut Daten: {skillById[selected]?.predecessors?.length > 0 ? skillById[selected].predecessors.join(', ') : '—'}
          </div>
        </div>
      )}
    </div>
  );
}

// ---- Main App ----
function App() {
  const [tab, setTab] = useState(0);
  const tabs = [
    { label: 'Ressource-Matrix', comp: Tab1 },
    { label: 'State-Requirements', comp: Tab2 },
    { label: 'Reuse-Analyse', comp: Tab3 },
    { label: 'Dependencies', comp: Tab4 },
    { label: 'Entry-Point Simulator', comp: Tab5 },
  ];
  const ActiveComp = tabs[tab].comp;
  const issues = D.validation_issues || [];

  return (
    <div>
      <h1>TAWO Workflow-Analyse</h1>
      <div className="subtitle">
        Generiert: {D.generated_at} · {D.skills.length} Skills · {D.resources.length} Ressourcen · {D.blocks.length} Blöcke
      </div>
      {issues.length > 0 ? (
        <div className="banner">
          <strong>Validation-Issues: {issues.length}</strong>
          {issues.map((issue, i) => (
            <div key={i} style={{marginTop:4, fontSize:12}}>
              <span className={`pill ${issue.severity === 'error' ? 'pill-miss' : 'pill-rw'}`}>{issue.severity}</span>
              {' '}{issue.message}
            </div>
          ))}
        </div>
      ) : (
        <div className={`banner banner-ok`} style={{fontSize:12, color:'#166534'}}>
          Keine Validation-Issues — Workflow-Daten konsistent.
        </div>
      )}
      <div className="tab-bar">
        {tabs.map((t, i) => (
          <button key={i} className={`tab-btn ${tab === i ? 'active' : ''}`} onClick={() => setTab(i)}>{t.label}</button>
        ))}
      </div>
      <ActiveComp />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
