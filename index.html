<script type="text/babel">
const { useState, useMemo } = React;

const D = window.WORKFLOW_DATA;

// Build lookup maps
const skillById = {};
D.skills.forEach(s => { skillById[s.id] = s; });
const blockById = {};
D.blocks.forEach(b => { blockById[b.id] = b; });
const resourceByName = {};
D.resources.forEach(r => { resourceByName[r.name] = r; });

// Determine first writer of each resource (workflow order)
const orderedSkillIds = D.blocks.flatMap(b => b.skills);
const firstWriterOf = {};
orderedSkillIds.forEach(sid => {
  const skill = skillById[sid];
  if (!skill) return;
  skill.writes.forEach(w => {
    if (!firstWriterOf[w]) firstWriterOf[w] = sid;
  });
});

// Resource type groups (ordered)
const TYPE_ORDER = ['Google Sheet','Datei','Datenbank Prozess','Externer Service','Referenz-Daten','Dateisystem'];
const typeColor = {
  'Google Sheet': '#166534',
  'Datei': '#1e40af',
  'Datenbank Prozess': '#6b21a8',
  'Externer Service': '#be185d',
  'Referenz-Daten': '#92400e',
  'Dateisystem': '#0e7490',
};

function groupResourcesByType(resources) {
  const groups = {};
  TYPE_ORDER.forEach(t => { groups[t] = []; });
  resources.forEach(r => {
    if (!groups[r.type]) groups[r.type] = [];
    groups[r.type].push(r);
  });
  return groups;
}

function getAccessType(skill, resourceName) {
  const reads = skill.reads.includes(resourceName);
  const writes = skill.writes.includes(resourceName);
  if (!reads && !writes) return null;
  const isCreator = writes && firstWriterOf[resourceName] === skill.id;
  const isUpdater = writes && !isCreator;
  if (isCreator && reads) return 'cr';
  if (isCreator) return 'c';
  if (isUpdater && reads) return 'ru';
  if (isUpdater) return 'u';
  return 'r';
}

const CRUD_PILL = {
  c:  { cls: 'pill-c',  label: 'C' },
  r:  { cls: 'pill-r',  label: 'R' },
  u:  { cls: 'pill-u',  label: 'U' },
  cr: { cls: 'pill-cr', label: 'C/R' },
  ru: { cls: 'pill-ru', label: 'R/U' },
};

function StatusPill({ status }) {
  const cls = status === 'live' ? 'pill-status-live' : status === 'beta' ? 'pill-status-beta' : 'pill-status-inarbeit';
  return <span className={`pill ${cls}`}>{status}</span>;
}

// ---- TAB 1: Ressource-Matrix ----
function Tab1() {
  const [expandedSkills, setExpandedSkills] = useState(new Set());
  const resGroups = groupResourcesByType(D.resources);
  const orderedResources = TYPE_ORDER.flatMap(t => resGroups[t] || []);
  const scriptIndex = D.script_index ? Object.fromEntries(D.script_index.map(s => [s.name, s])) : {};

  return (
    <div>
      <div className="tab-desc">
        Zeigt pro Skill (Zeile) und Ressource (Spalte) den Zugriffstyp nach CRUD-Schema. <strong>C</strong> = der Skill erzeugt die Ressource erstmalig im Workflow, <strong>U</strong> = der Skill aktualisiert eine bereits existierende Ressource, <strong>R</strong> = nur Lesen. Skills sind nach Prozessblock gruppiert, Ressourcen nach Typ.
      </div>
      <div className="info-row" style={{marginBottom: 12}}>
        <span className="info-item"><strong>{D.skills.length}</strong> Skills</span>
        <span className="info-item"><strong>{D.resources.length}</strong> Ressourcen</span>
        <span className="info-item"><strong>{D.blocks.length}</strong> Blöcke</span>
        <span className="info-item">
          <span className="pill pill-c" style={{marginRight:4}}>C</span>Create&nbsp;
          <span className="pill pill-r" style={{marginRight:4}}>R</span>Read&nbsp;
          <span className="pill pill-u" style={{marginRight:4}}>U</span>Update&nbsp;
          <span className="pill pill-d" style={{marginRight:4}}>D</span>Delete&nbsp;
          <span className="pill pill-cr" style={{marginRight:4}}>C/R</span>Create+Read&nbsp;
          <span className="pill pill-ru" style={{marginRight:4}}>R/U</span>Read+Update
        </span>
      </div>
      <div className="overflow-x">
        <table>
          <thead>
            <tr>
              <th className="sticky-col" style={{minWidth:180}}>Skill</th>
              <th style={{minWidth:60, textAlign:'center'}}>Block</th>
              {orderedResources.map(r => (
                <th key={r.name} style={{minWidth:80, maxWidth:110, fontSize:10, fontWeight:600, color: typeColor[r.type] || '#64748b', whiteSpace:'normal', wordBreak:'break-word', lineHeight:'1.3', padding:'6px 6px'}} title={r.name}>
                  {r.name}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {D.blocks.map(block => [
              <tr key={`block-${block.id}`} className="block-header">
                <td className="sticky-col" colSpan={2} style={{fontWeight:700, fontSize:11, color:'#475569', background:'#e2e8f0'}}>{block.name}</td>
                {orderedResources.map(r => (
                  <td key={r.name} style={{background:'#e2e8f0'}}></td>
                ))}
              </tr>,
              ...block.skills.map(sid => {
                const skill = skillById[sid];
                if (!skill) return null;
                const isExpanded = expandedSkills.has(sid);
                const scripts = skill.scripts || [];
                const toggleExpand = () => {
                  const next = new Set(expandedSkills);
                  next.has(sid) ? next.delete(sid) : next.add(sid);
                  setExpandedSkills(next);
                };
                return [
                  <tr key={sid} className="skill-row">

                      const t = getAccessType(skill, r.name);

                      const p = CRUD_PILL[t];
                      return <td key={r.name} style={{textAlign:'center'}}><span className={`pill ${p.cls}`}>{p.label}</span></td>;
                    })}
                  </tr>,
                  isExpanded && scripts.map((sc, idx) => {
                    const si = scriptIndex[sc.name] || {};
                    const otherSkills = (si.used_by_skills || []).filter(s => s !== skill.name);

                    return (
                      <tr key={`${sid}-script-${idx}`} className="script-row">
                        <td className="sticky-col" style={{background:'#fafbfc'}}>
                          <div style={{display:'flex', alignItems:'center', flexWrap:'wrap', gap:2}}>

                            {sc.role === 'infra' && importerCount > 0 && <span className="script-meta">{importerCount} Importer</span>}
                          </div>
                        </td>
                        <td style={{background:'#fafbfc'}}></td>
                        {orderedResources.map(r => {
                          const t = getAccessType(skill, r.name);
                          if (!t) return <td key={r.name} style={{textAlign:'center', background:'#fafbfc'}}></td>;
                          const p = CRUD_PILL[t];
                          return <td key={r.name} style={{textAlign:'center', background:'#fafbfc'}}><span className={`pill ${p.cls}`} style={{opacity:0.4, fontSize:9}}>{p.label}</span></td>;

              }).filter(Boolean)

        </table>
      </div>
      <div style={{marginTop:12, display:'flex', flexWrap:'wrap', gap:12}}>

      </div>
    </div>
  );
}

// ---- TAB 5: Einstiegspunkte ----
function Tab5() {
  const [selected, setSelected] = useState(null);
  const [spurFilter, setSpurFilter] = useState('all');

  const writtenBy = {};
  D.skills.forEach(skill => {
    skill.writes.forEach(w => {
      if (!writtenBy[w]) writtenBy[w] = [];
      if (!writtenBy[w].includes(skill.id)) writtenBy[w].push(skill.id);
    });
  });

  function getSkillsBefore(skillId) {
    const skill = skillById[skillId];
    if (!skill) return new Set();
    const blockOrder = D.blocks.map(b => b.id);
    const myBlockIdx = blockOrder.indexOf(skill.block);
    const before = new Set();
    D.skills.forEach(s => {
      const sBlockIdx = blockOrder.indexOf(s.block);
      if (sBlockIdx < myBlockIdx) before.add(s.id);
      if (sBlockIdx === myBlockIdx) {
        const blockSkills = blockById[skill.block]?.skills || [];
        const myIdx = blockSkills.indexOf(skillId);
        const sIdx = blockSkills.indexOf(s.id);
        if (sIdx < myIdx) before.add(s.id);
      }
    });
    return before;
  }

  // Readiness for ALL skills — computed once
  // Logik: Wenn du bei Skill X einsteigst, überspringst du ALLE vorherigen Skills.
  // Deren Outputs sind also NICHT vorhanden → fehlt.
  const readinessMap = useMemo(() => {
    const map = {};
    D.skills.forEach(skill => {
      const items = [];
      skill.reads.forEach(res => {
        const producers = writtenBy[res] || [];
        const isExternal = producers.length === 0;
        // Nur "self" wenn dieser Skill der ERSTE Schreiber ist (Create, nicht Update)
        const selfCreates = skill.writes.includes(res) && firstWriterOf[res] === skill.id;

        if (selfCreates) {
          items.push({ resource: res, status: 'self' });
        } else if (isExternal) {
          items.push({ resource: res, status: 'extern' });
        } else {
          // Ressource wird von anderem Workflow-Skill erzeugt → fehlt beim Direkteinstieg
          const creator = firstWriterOf[res];
          const updaters = producers.filter(p => p !== creator);
          items.push({ resource: res, status: 'fehlt', creator, updaters });
        }
      });
      map[skill.id] = { items, fehltCount: items.filter(i => i.status === 'fehlt').length, total: items.length };
    });
    return map;
  }, []);

  // Spuren dynamisch aus Daten ableiten
  const allSpuren = useMemo(() => {
    const set = new Set();
    D.skills.forEach(s => s.spuren.forEach(sp => set.add(sp)));
    return [...set].sort();
  }, []);

  const filteredSkills = D.skills.filter(s => {
    if (spurFilter === 'all') return true;
    return s.spuren.includes(spurFilter);
  });

  const sel = selected ? readinessMap[selected] : null;

  return (
    <div>
      <div className="tab-desc">
        Wähle einen Skill als Einstiegspunkt. Der Badge zeigt wie viele Ressourcen fehlen wenn alle vorherigen Skills übersprungen werden. <span style={{color:'#166534'}}>✓</span> = selbst erzeugt oder extern, <span style={{color:'#991b1b'}}>✗</span> = fehlt (muss vorher bereitgestellt werden).
      </div>
      <div style={{marginBottom:16}}>
        <div style={{fontSize:13, fontWeight:600, marginBottom:8}}>Spur-Filter</div>
        <div className="spur-filter">
          {['all', ...allSpuren].map(spur => (
            <button key={spur} className={`spur-btn ${spurFilter === spur ? 'active' : ''}`} onClick={() => setSpurFilter(spur)}>
              {spur === 'all' ? 'Alle Spuren' : `Spur ${spur}`}
            </button>
          ))}
        </div>
      </div>
      <div style={{fontSize:13, fontWeight:600, marginBottom:8}}>Skill als Einstiegspunkt wählen:</div>
      <div className="entry-grid">
        {filteredSkills.map(skill => {
          const r = readinessMap[skill.id];
          return (
            <button key={skill.id} className={`entry-btn ${selected === skill.id ? 'selected' : ''}`} onClick={() => setSelected(skill.id === selected ? null : skill.id)}>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:2}}>
                <StatusPill status={skill.status}/>
                {r.fehltCount === 0
                  ? <span style={{fontSize:9, fontWeight:700, color:'#166534', background:'#dcfce7', borderRadius:8, padding:'1px 6px'}}>✓ direkt</span>
                  : <span style={{fontSize:9, fontWeight:700, color:'#991b1b', background:'#fef2f2', borderRadius:8, padding:'1px 6px'}}>{r.fehltCount} fehlt</span>
                }
              </div>
              <div style={{fontWeight:600, fontSize:12}}>{skill.slash_command}</div>
            </button>
          );
        })}
      </div>
      {selected && sel && (
        <div className="panel" style={{marginTop:8}}>
          <div className="panel-title">
            Einstieg bei <strong>{skillById[selected]?.slash_command}</strong> — {sel.total} Ressourcen benötigt, {sel.fehltCount} fehlen
          </div>
          {sel.items.length === 0 ? (
            <div className="missing-ok">Keine Ressourcen benötigt — Skill hat keine Reads.</div>
          ) : (
            <div style={{marginTop:8}}>
              {sel.items.map(item => (
                <div key={item.resource} style={{
                  display:'flex', alignItems:'flex-start', gap:8, padding:'6px 10px', marginBottom:4,
                  borderRadius:6,
                  background: item.status === 'fehlt' ? '#fef2f2' : item.status === 'self' ? '#eff6ff' : '#f8fafc',
                  border: item.status === 'fehlt' ? '1px solid #fecaca' : '1px solid #e2e8f0'
                }}>
                  <span style={{fontSize:13, flexShrink:0, marginTop:1, color: item.status === 'fehlt' ? '#991b1b' : item.status === 'self' ? '#1e40af' : '#166534'}}>
                    {item.status === 'fehlt' ? '✗' : '✓'}
                  </span>
                  <div>
                    <strong style={{fontSize:12}}>{item.resource}</strong>
                    <div style={{fontSize:11, color:'#64748b', marginTop:1}}>
                      {item.status === 'self' && 'Wird von diesem Skill selbst erzeugt'}
                      {item.status === 'extern' && 'Externe Ressource — immer manuell bereitzustellen'}
                      {item.status === 'fehlt' && <span>
                        Erstellt von: <span className="tag tag-miss" style={{marginLeft:2}}>{skillById[item.creator]?.slash_command || item.creator}</span>
                        {item.updaters.length > 0 && <span style={{marginLeft:6, color:'#94a3b8'}}>| Update: {item.updaters.map(p => <span key={p} style={{fontSize:10, color:'#92400e', marginLeft:2}}>{skillById[p]?.slash_command || p}</span>)}</span>}
                      </span>}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}
          <div style={{marginTop:12, fontSize:11, color:'#94a3b8'}}>
            Vorgänger im normalen Ablauf: {skillById[selected]?.predecessors?.length > 0 ? skillById[selected].predecessors.join(', ') : '—'}
          </div>
        </div>
      )}
    </div>
  );
}

// ---- TAB 6: Script-Dependencies ----
function Tab6() {
  const [selectedScript, setSelectedScript] = useState(null);
  const scriptIndex = D.script_index || [];
  const orphaned = D.orphaned_scripts || [];

  const critical = scriptIndex.filter(s => s.total_dependents >= 4);

  const skillScripts = {};
  D.skills.forEach(s => {
    if (s.scripts && s.scripts.length > 0) {
      skillScripts[s.name] = s.scripts.map(sc => sc.name);
    }
  });
  const couplingPairs = [];
  const skillNames = Object.keys(skillScripts);
  for (let i = 0; i < skillNames.length; i++) {
    for (let j = i + 1; j < skillNames.length; j++) {
      const a = skillNames[i], b = skillNames[j];
      const shared = skillScripts[a].filter(s => skillScripts[b].includes(s));
      if (shared.length >= 2) {
        couplingPairs.push({ a, b, shared, score: shared.length });
      }
    }
  }
  couplingPairs.sort((a, b) => b.score - a.score);

  const roleClass = r => r === 'shared' ? 'role-shared' : r === 'infra' ? 'role-infra' : 'role-main';

  return (
    <div>
      <div className="tab-desc">
        Analysiert Python-Scripts im <code>scripts/</code> Ordner: Welche Skills nutzen welches Script, welche Scripts importieren sich gegenseitig, und wo entsteht versteckte Kopplung.
      </div>

      <div className="panel">
        <div className="panel-title">Kritische Scripts (&ge;4 Dependents)</div>
        {critical.length === 0 ? <div style={{fontSize:12, color:'#94a3b8'}}>Keine kritischen Scripts gefunden.</div> : (
          <table>
            <thead>
              <tr>
                <th>Script</th>
                <th>Role</th>
                <th>Skills (direkt)</th>
                <th>Importiert von</th>
                <th>Importiert</th>
                <th style={{textAlign:'center'}}>Deps</th>
              </tr>
            </thead>
            <tbody>
              {critical.map(s => (
                <tr key={s.name} onClick={() => setSelectedScript(selectedScript === s.name ? null : s.name)} style={{cursor:'pointer'}}>
                  <td style={{fontFamily:'monospace', fontSize:12, fontWeight:600}}>
                    <span style={{marginRight:6, color:'#94a3b8', fontSize:10}}>{selectedScript === s.name ? '\u25BC' : '\u25B6'}</span>
                    {s.name}
                  </td>
                  <td><span className={`role-badge ${roleClass(s.role)}`}>{s.role}</span></td>
                  <td>{s.used_by_skills.length > 0 ? s.used_by_skills.map(sk => <span key={sk} className="tag tag-w" style={{fontSize:10}}>{sk}</span>) : <span style={{color:'#94a3b8'}}>&mdash;</span>}</td>
                  <td>{s.imported_by_scripts.length > 0 ? s.imported_by_scripts.map(sc => <span key={sc} style={{fontFamily:'monospace', fontSize:10, color:'#6d28d9', marginRight:4}}>{sc}</span>) : <span style={{color:'#94a3b8'}}>&mdash;</span>}</td>
                  <td>{s.imports.length > 0 ? s.imports.map(sc => <span key={sc} style={{fontFamily:'monospace', fontSize:10, color:'#475569', marginRight:4}}>{sc}</span>) : <span style={{color:'#94a3b8'}}>&mdash;</span>}</td>
                  <td style={{textAlign:'center'}}><span className={`pill ${s.total_dependents >= 6 ? 'pill-miss' : 'pill-rw'}`}>{s.total_dependents}</span></td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>

      {scriptIndex.length > 0 && (
        <div className="panel">
          <div className="panel-title">Alle Scripts ({scriptIndex.length})</div>
          <table>
            <thead>
              <tr>
                <th>Script</th>
                <th>Role</th>
                <th>Skills</th>
                <th style={{textAlign:'center'}}>Deps</th>
              </tr>
            </thead>
            <tbody>
              {scriptIndex.map(s => (
                <tr key={s.name}>
                  <td style={{fontFamily:'monospace', fontSize:11}}>{s.name}</td>
                  <td><span className={`role-badge ${roleClass(s.role)}`}>{s.role}</span></td>
                  <td>{s.used_by_skills.length > 0 ? s.used_by_skills.join(', ') : <span style={{color:'#94a3b8'}}>&mdash;</span>}</td>
                  <td style={{textAlign:'center'}}><span className="pill pill-rw">{s.total_dependents}</span></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {couplingPairs.length > 0 && (
        <div className="panel">
          <div className="panel-title">Coupling-Analyse (Skills mit &ge;2 geteilten Scripts)</div>
          <div style={{display:'flex', flexWrap:'wrap', gap:4}}>
            {couplingPairs.map((p, i) => (
              <div key={i} className="coupling-card">
                <span className="coupling-score">{p.score}</span>
                <span><strong>{p.a}</strong> &harr; <strong>{p.b}</strong></span>
                <span style={{fontSize:10, color:'#64748b'}}>({p.shared.join(', ')})</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {orphaned.length > 0 && (
        <div className="panel">
          <div className="panel-title">Orphaned Scripts ({orphaned.length})</div>
          <div style={{fontSize:12, color:'#64748b', marginBottom:8}}>Weder von einem Skill referenziert noch von anderen Scripts importiert. Kandidaten fuer Cleanup oder fehlende SKILL.md-Referenzen.</div>
          <div style={{display:'flex', flexWrap:'wrap', gap:4}}>
            {orphaned.map(s => <span key={s} className="role-badge role-orphaned" style={{fontSize:11, padding:'3px 8px'}}>{s}</span>)}
          </div>
        </div>
      )}

      <div style={{marginTop:12, fontSize:11, color:'#64748b', display:'flex', gap:12}}>
        <span><span className="role-badge role-main">main</span> Nur direkt aufgerufen</span>
        <span><span className="role-badge role-shared">shared</span> Direkt + importiert</span>
        <span><span className="role-badge role-infra">infra</span> Nur Library</span>
        <span><span className="role-badge role-orphaned">orphaned</span> Nicht referenziert</span>
      </div>
    </div>
  );
}

// ---- Main App ----
function App() {
  const [tab, setTab] = useState(0);
  const tabs = [
    { label: 'Ressource-Matrix', comp: Tab1 },
    { label: 'Skill-Anforderungen', comp: Tab2 },
    { label: 'Ressourcen-Analyse', comp: Tab3 },
    { label: 'Datenfluss', comp: Tab4 },
    { label: 'Einstiegspunkte', comp: Tab5 },
    { label: 'Script-Dependencies', comp: Tab6 },
  ];
  const ActiveComp = tabs[tab].comp;
  const issues = D.validation_issues || [];

  return (
    <div>
      <h1>TAWO Workflow-Analyse</h1>
      <div className="subtitle">
        Generiert: {D.generated_at} · {D.skills.length} Skills · {D.resources.length} Ressourcen · {D.blocks.length} Blöcke{D.script_index ? ` · ${D.script_index.length} Scripts` : ''}
      </div>
      {issues.length > 0 ? (
        <div className="banner">
          <strong>Validation-Issues: {issues.length}</strong>
          {issues.map((issue, i) => (
            <div key={i} style={{marginTop:4, fontSize:12}}>
              <span className={`pill ${issue.severity === 'error' ? 'pill-miss' : 'pill-rw'}`}>{issue.severity}</span>
              {' '}{issue.message}
            </div>
          ))}
        </div>
      ) : (
        <div className={`banner banner-ok`} style={{fontSize:12, color:'#166534'}}>
          Keine Validation-Issues — Workflow-Daten konsistent.
        </div>
      )}
      <div className="tab-bar">
        {tabs.map((t, i) => (
          <button key={i} className={`tab-btn ${tab === i ? 'active' : ''}`} onClick={() => setTab(i)}>{t.label}</button>
        ))}
      </div>
      <ActiveComp />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
